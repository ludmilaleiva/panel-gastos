name: Keep Supabase Alive

# Mantiene el proyecto de Supabase despierto: le hace una consulta mínima
# cada 3 días (el plan gratis se pausa tras ~7 días sin actividad).
on:
  schedule:
    - cron: '0 12 */3 * *'   # cada 3 días, 12:00 UTC (~09:00 ARG)
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://ranofexflfdzdibbeihq.supabase.co/rest/v1/gastos?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbm9mZXhmbGZkemRpYmJlaWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzQ5MDYsImV4cCI6MjA5NjE1MDkwNn0.61g7Us9mTChOF8FxPtrdJA7UDvsPauJoB3HJyRdIgyY")
          echo "Supabase respondió HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::Supabase no respondió 200 (código $CODE)"
            exit 1
          fi
